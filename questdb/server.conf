# /opt/questdb-config/server.conf — copied to /var/lib/questdb/conf/server.conf
# at runtime by entrypoint.sh.
#
# PGWire on :8812 (asyncpg consumers in MCP code), HTTP on :9000 (exec endpoint),
# ILP/TCP on :9009.
http.bind.to=0.0.0.0:9000
pg.bind.to=0.0.0.0:8812
line.tcp.bind.to=0.0.0.0:9009
http.min.bind.to=0.0.0.0:9003

# Single-tenant pod — admin/quest is fine; per-pod hostname provides isolation.
pg.user=admin
pg.password=quest

# Tune for a ~3 GB pod budget.
shared.worker.count=2
http.worker.count=2
